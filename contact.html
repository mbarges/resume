My PhD research project investigates the dynamics driving the adoption (and non-adoption) of mandatory bird-friendly building policies in U.S. and Canadian cities. I combine public policy analysis, environmental ethics, and urban political ecology to explain why some cities have mandatory bird-friendly building policies and others don't.</p> 
In my advocacy role, I help people and decision makers to appreciate the complex lives of birds and how our decisions about building, lighting, and landscaping affect birds and human communities. I organize and partner with community groups to push for better rules to protect birds from building collisions and light pollution. 
</p></p>I co-led a successful statewide campaign to pass <a href="https://www.cga.ct.gov/2023/act/pa/pdf/2023PA-00143-R00HB-06607-PA.pdf">CT Public Act 23-143</a>, Connecticut's lights out bill, which requires all CT state agencies to turn off unnecessary outdoor nighttime lights at state-owned buildings year-round for birds. In 2024, I worked with local advocates to convince the Town of Greenwich to adopt a <a href="https://www.greenwichct.gov/DocumentCenter/View/1265/Division-14---Lighting-Requirements-PDF">Lighting Zoning Code Amendment</a> comprising the most comprehensive municipal lighting law in Connecticut. 
</p></p>To reduce bird building collisions on my campus, I helped convince the SUNY School of Environmental Science & Forestry to adopt a mandatory bird-friendly building policy for all new buildings and major retrofits as part of the <a href="https://www.esf.edu/sustainability/initiatives/leadership-administration/sustainability-action-plan/SustainabilityActionPlan_2025.pdf">2025 Sustainability Action Plan</a>. As a graduate student, I also led a community, art-based bird collision mitigation project <a href="https://www.linkedin.com/posts/sunyesf_improveourworld-activity-7336061742206144513-YTVq/2">community, art-based bird collision mitigation project </a>  that retrofitted several glass windscreens on campus.
